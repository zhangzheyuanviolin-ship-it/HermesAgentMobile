name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'flutter_app/**'
      - 'scripts/**'
      - '.github/workflows/flutter-build.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y zstd binutils

      - name: Fetch proot binaries
        run: bash scripts/fetch-proot-binaries.sh

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Prepare release signing
        working-directory: flutter_app/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p app
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/release.keystore
            printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release.keystore\n" \
              "$ANDROID_KEYSTORE_PASSWORD" \
              "$ANDROID_KEY_PASSWORD" \
              "$ANDROID_KEY_ALIAS" > key.properties
          else
            echo "No release keystore secret found, using debug fallback signing."
          fi

      - name: Print signing mode
        working-directory: flutter_app/android
        run: |
          if [ -f key.properties ] && [ -f app/release.keystore ]; then
            echo "Signing mode: release keystore"
          else
            echo "Signing mode: debug fallback"
          fi

      - name: Build release APK
        working-directory: flutter_app
        run: |
          flutter build apk --release \
            --build-name "0.3.15" \
            --build-number "${{ github.run_number }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-agent-mobile-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
