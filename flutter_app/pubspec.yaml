name: hermes_agent_mobile
description: Hermes Agent AI Gateway for Android - standalone, no Termux required.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  xterm: ^4.0.0
  flutter_pty: ^0.4.2
  webview_flutter: ^4.4.0
  dio: ^5.4.0
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: 2.3.2
  path_provider: ^2.1.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.0
  web_socket_channel: ^3.0.0
  cryptography: ^2.7.0
  google_fonts: ^6.1.0
  uuid: ^4.2.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path: ^1.9.0
  camera: ^0.11.0
  geolocator: ^12.0.0
  flutter_blue_plus: ^1.32.0
  usb_serial: ^0.5.1

dependency_overrides:
  shared_preferences_android: 2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/resolv.conf
    - assets/ic_launcher.png
  fonts:
    - family: DejaVuSansMono
      fonts:
        - asset: assets/fonts/DejaVuSansMono.ttf
        - asset: assets/fonts/DejaVuSansMono-Bold.ttf
          weight: 700
